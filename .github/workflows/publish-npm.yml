name: Publish npm

# Veroeffentlicht die Angular-Library @apollo29/workflow-client in die GitHub-Packages
# npm-Registry bei Tags wie "client-v1.0.0". Nutzt das eingebaute GITHUB_TOKEN
# (kein zusaetzliches Secret noetig).

on:
  push:
    tags: ['client-v*']

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish @apollo29/workflow-client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node (GitHub Packages)
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@apollo29'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Version aus Tag uebernehmen (client-vX.Y.Z -> X.Y.Z)
        run: |
          VERSION="${GITHUB_REF_NAME#client-v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        working-directory: frontend/projects/workflow-client

      - name: Build Library
        run: npx ng build workflow-client

      - name: Publish
        run: npm publish
        working-directory: frontend/dist/workflow-client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
