services:
  mariadb:
    image: mariadb:11.4
    container_name: wrkflw-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASS:-root}
      MARIADB_DATABASE: ${DB_NAME:-workflow}
      MARIADB_USER: ${DB_USER:-workflow}
      MARIADB_PASSWORD: ${DB_PASS:-root}
    ports:
      # Host-Port standardmaessig 3307, um Konflikte mit einer lokalen MySQL/MariaDB
      # (Port 3306) zu vermeiden. Per DB_PORT in .env ueberschreibbar.
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
      - ../backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  php-cli:
    image: php:8.4-cli
    container_name: wrkflw-php
    working_dir: /app
    volumes:
      - ../backend:/app
    depends_on:
      mariadb:
        condition: service_healthy
    command: ["tail", "-f", "/dev/null"]

volumes:
  mariadb-data:
